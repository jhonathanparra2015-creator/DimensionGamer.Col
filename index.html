<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamShop Pro - Database Ready</title>
    <style>
        :root { --primary: #e50914; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        
        /* Navbar con Logo e Imagen Real */
        header { padding: 15px 5%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo img { height: 40px; vertical-align: middle; }

        /* Categorías */
        .nav-links { background: #111; display: flex; justify-content: center; gap: 25px; padding: 12px; border-bottom: 1px solid #222; }
        .nav-links a { color: #888; text-decoration: none; font-weight: bold; font-size: 0.85em; text-transform: uppercase; }
        .nav-links a:hover { color: var(--primary); }

        /* Banner con Imagen Real */
        .main-banner { 
            height: 350px; 
            background: linear-gradient(to bottom, transparent, var(--bg)), url('TU_IMAGEN_DE_BANNER.jpg'); 
            background-size: cover; 
            background-position: center;
            display: flex; align-items: flex-end; padding: 40px 5%;
        }

        /* Cuadrícula de productos */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-content { padding: 15px; }

        select, input { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box;}
        button { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="URL_DE_TU_LOGO.png" alt="Logo">
        </div>
        <div>🛒 <span id="cart-count">0</span> items</div>
    </header>

    <nav class="nav-links">
        <a href="#populares">Populares</a>
        <a href="#cine">Cine</a>
        <a href="#musica">Música</a>
    </nav>

    <div class="main-banner">
        <div>
            <h1>Premium Streaming</h1>
            <p>Acceso inmediato a tus series favoritas.</p>
        </div>
    </div>

    <div class="container">
        <div id="user-info" style="margin-bottom: 40px; background: #161616; padding: 20px; border-radius: 10px;">
            <h3>Tus Datos de Pedido</h3>
            <input type="text" id="client-name" placeholder="Tu Nombre">
            <input type="email" id="client-email" placeholder="Tu Correo Electrónico">
        </div>

        <h2 id="populares">Plataformas Destacadas</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=500" alt="Netflix">
                <div class="card-content">
                    <h3>Netflix</h3>
                    <select id="sel-netflix">
                        <option value="Perfil Básico|5.00">Perfil Básico - $5.00</option>
                        <option value="Perfil Premium|8.50">Perfil Premium - $8.50</option>
                    </select>
                    <button onclick="addToCart('Netflix', 'sel-netflix')">Añadir</button>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1633514091307-88e5d070b40e?w=500" alt="Disney">
                <div class="card-content">
                    <h3>Disney+</h3>
                    <select id="sel-disney">
                        <option value="Mes Completo|4.00">Mes Completo - $4.00</option>
                        <option value="Combo Star+|7.00">Combo Star+ - $7.00</option>
                    </select>
                    <button onclick="addToCart('Disney+', 'sel-disney')">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="whatsapp-float" onclick="processOrder()">Enviar Pedido a WhatsApp</a>

    <script>
        let cart = [];

        function addToCart(platform, selectId) {
            const select = document.getElementById(selectId);
            const [variant, price] = select.value.split('|');
            cart.push({ platform, variant, price: parseFloat(price) });
            document.getElementById('cart-count').innerText = cart.length;
            alert(`${platform} añadido correctamente`);
        }

        async function processOrder() {
            const name = document.getElementById('client-name').value;
            const email = document.getElementById('client-email').value;

            if (!name || cart.length === 0) {
                alert("Por favor ingresa tu nombre y añade productos.");
                return;
            }

            const orderData = {
                client: name,
                email: email,
                items: cart,
                total: cart.reduce((sum, i) => sum + i.price, 0),
                date: new Date().toISOString()
            };

            // --- EXPLICACIÓN DE BASE DE DATOS ---
            // Aquí llamarías a una función para guardar en la base de datos
            // Ejemplo (Pseudo-código de Firebase):
            // await db.collection('pedidos').add(orderData);
            
            console.log("Guardando en Base de Datos:", orderData);

            // Generar WhatsApp
            let text = `*NUEVO PEDIDO*%0ACliente: ${name}%0A%0A`;
            cart.forEach(item => {
                text += `• ${item.platform} (${item.variant})%0A`;
            });
            text += `%0ATotal: $${orderData.total.toFixed(2)}`;

            window.open(`https://wa.me/573000000000?text=${text}`, '_blank');
        }
    </script>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    // 1. Pega aquí los datos que copiaste de la consola de Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAjAmZM8KUnX361LtAv_7nAKqqpTJafNXw",
  authDomain: "dimensiongamercol-659d7.firebaseapp.com",
  projectId: "dimensiongamercol-659d7",
  storageBucket: "dimensiongamercol-659d7.firebasestorage.app",
  messagingSenderId: "826111260875",
  appId: "1:826111260875:web:8ee179e4fb4e41da3b834e",
  measurementId: "G-FXMV9SBZ5D"
};

    // 2. Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 3. Función actualizada para procesar el pedido
    async function processOrder() {
        const name = document.getElementById('client-name').value;
        const email = document.getElementById('client-email').value;

        if (!name || cart.length === 0) {
            alert("Por favor ingresa tu nombre y añade productos.");
            return;
        }

        const orderData = {
            cliente: name,
            email: email,
            productos: cart,
            total: cart.reduce((sum, i) => sum + i.price, 0),
            fecha: new Date().toLocaleString()
        };

        try {
            // GUARDAR EN FIREBASE
            // Esto crea una "carpeta" llamada pedidos y guarda los datos ahí
            await database.ref('pedidos').push(orderData);
            
            console.log("Pedido guardado con éxito en la nube.");

            // Luego de guardar, procedemos a WhatsApp
            let text = `*NUEVO PEDIDO REGISTRADO*%0ACliente: ${name}%0A%0A`;
            cart.forEach(item => {
                text += `• ${item.platform} (${item.variant})%0A`;
            });
            text += `%0ATotal: $${orderData.total.toFixed(2)}`;

            window.open(`https://wa.me/573000000000?text=${text}`, '_blank');
            
            // Opcional: Limpiar carrito tras éxito
            cart = [];
            document.getElementById('cart-count').innerText = "0";

        } catch (error) {
            console.error("Error al guardar:", error);
            alert("Hubo un error al procesar tu pedido. Intenta de nuevo.");
        }
    }
</script>
</body>
</html>
